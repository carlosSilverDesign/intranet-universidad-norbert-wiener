<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pop-up de Confirmación</title>
  <link rel="stylesheet" href="photo-update-styles.css">
  <style>
    /* Fondo semitransparente */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    /* Contenido del pop-up */
    .popup-content {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
      width: 90%;
      margin: 0 12px;
    }

    .popup-content p {
      font-size: 1rem;
      color: #222;
      margin-bottom: 20px;
      line-height: 1.25;
    }

    .popup-content button {
      background: #0F848F;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .popup-content button:hover {
      background: #0c6a73;
    }
  </style>
</head>
<body>
  <div id="success-popup" class="popup" style="display: none;">
    <div class="popup-content">
      <h3>¡Solicitud Enviada!</h3>
      <p>Recuerda que la actualización de fotos sólo puede solicitarse una vez por Ciclo académico.</p>
      <button id="close-popup">Cerrar</button>
    </div>
  </div>

  <script>
    // Función para mostrar el pop-up
    function showPopup() {
      const popup = document.getElementById('success-popup');
      popup.style.display = 'flex';
    }

    // Función para cerrar el pop-up
    document.getElementById('close-popup').addEventListener('click', () => {
      const popup = document.getElementById('success-popup');
      popup.style.display = 'none';
    });
  </script>

  <!-- Mostrar el pop-up al cargar la página -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      showPopup();
    });
  </script>
</body>
</html>
